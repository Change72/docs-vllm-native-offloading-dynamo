apiVersion: v1
kind: ServiceAccount
metadata:
  name: sweep-orchestrator-sa
  namespace: changg-dynamo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: changg-dynamo
  name: sweep-orchestrator-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "get"]
- apiGroups: ["nvidia.com"]
  resources: ["dynamographdeployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["grove.io"]
  resources: ["podcliques", "podcliquesets", "podgangs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: changg-dynamo
  name: sweep-orchestrator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sweep-orchestrator-role
subjects:
- kind: ServiceAccount
  name: sweep-orchestrator-sa
  namespace: changg-dynamo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sweep-results
  namespace: changg-dynamo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
